<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Property Recommendations</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background-color: #f8f9fa;
        }

        .top-card {
            border: 2px solid #0d6efd;
            border-radius: 18px;
        }

        .normal-card {
            border-radius: 16px;
        }

        .score-badge {
            font-size: 0.9rem;
        }

        .section-title {
            font-weight: 700;
        }
    </style>
</head>

<body>

<div class="container py-5">

    <div class="mb-4">
        <h1 class="fw-bold">Your Property Recommendations</h1>
        <p class="text-muted">
            Ranked based on your budget, property preference, market value, and location insights.
        </p>
    </div>

    <!-- User Input Summary -->
   <div class="mb-4">
		<p class="text-muted mb-2">
			Recommendations based on your preferences
		</p>

		<div id="userInputSummary" class="d-flex flex-wrap gap-2">
		</div>
	</div>

    <!-- Top Recommendation -->
    <div id="topRecommendation"></div>

    <!-- Other Recommendations -->
    <h4 class="section-title mt-5 mb-3">Other Suitable Options</h4>
    <div class="row" id="otherRecommendations"></div>

    <!-- Added new charts here -->
    <h4 class="section-title mt-5 mb-3">Property Comparison</h4>
    <div class="row mb-4">
        <div class="col-md-12 mb-6">
            <div class="card shadow-sm rounded-4 p-3">
                <p class="text-muted small mb-2">Median Price Comparison (RM)</p>
                <canvas id="chartPrices" height="260"></canvas>
            </div>
        </div>
    </div>

    <!-- AI Explanation -->
    <div class="card shadow-sm mt-5 border-primary">
        <div class="card-body">
            <h4 class="section-title">AI Decision Explanation</h4>
            <p id="aiExplanation" class="mb-0"></p>
            <hr>
            <div id="chatHistory" class="mb-3"></div>
            <div class="d-flex gap-2">
                <input type="text" id="chatInput" class="form-control form-control-sm" placeholder="Ask a follow-up question...">
                <button class="btn btn-primary btn-sm" onclick="sendChat()">Ask</button>
            </div>
        </div>
    </div>


    <div class="mt-4">
        <a href="/" class="btn btn-outline-secondary">
            Search Again
        </a>
    </div>

</div>

<script>
let userInput = JSON.parse(localStorage.getItem("userInput"));
let result = JSON.parse(localStorage.getItem("searchResults"));
const BACKEND_URL = "{{ backend_url }}";

/* Show user input */
document.getElementById("userInputSummary").innerHTML = `
    <span class="badge rounded-pill text-bg-light border fs-6">
        Budget: RM ${userInput.budget.toLocaleString()}
    </span>

    <span class="badge rounded-pill text-bg-light border fs-6">
        ${userInput.state}
    </span>

    <span class="badge rounded-pill text-bg-light border fs-6">
        ${userInput.property_type}
    </span>
`;


/* Top recommendation */
const topProperty = result.recommendations[0];

if (!topProperty) {
    document.getElementById("topRecommendation").innerHTML = `
        <div class="alert alert-warning" role="alert">
            No recommendations found based on your criteria. Please try adjusting your preferences.
        </div>
    `;
} else {

document.getElementById("topRecommendation").innerHTML = `
    <h4 class="section-title mb-3">Top Recommendation</h4>

    <div class="card shadow top-card">
        <div class="card-body p-4">

            <div class="d-flex justify-content-between align-items-start mb-3">
                <div>
                    <span class="badge bg-primary mb-2">Rank #1</span>
                    <h3 class="fw-bold">${topProperty.township}</h3>
                    <p class="text-muted mb-0">${topProperty.area}, ${topProperty.state} · ${topProperty.type}</p>
                </div>

                <span class="badge bg-success score-badge">
                    Score: ${topProperty.score}/100
                </span>
            </div>

            <div class="row mt-4">
                <div class="col-md-4">
                    <strong>Median Price</strong>
                    <p>RM ${topProperty.median_price.toLocaleString()}</p>
                </div>

                <div class="col-md-4">
                    <strong>Price per sqft</strong>
                    <p>RM ${topProperty.median_psf}</p>
                </div>

                <div class="col-md-4">
                    <strong>Location Highlights</strong>
                    <p>${topProperty.perks}</p>
                </div>

                <div class="col-md-12">
                    <strong>Amenities</strong>
                    <p>${topProperty.amenities}</p>
                </div>
            </div>

        </div>
    </div>
`;

/* Other recommendations */
const otherDiv = document.getElementById("otherRecommendations");

result.recommendations.slice(1, 3).forEach((property, index) => {
    otherDiv.innerHTML += `
        <div class="col-md-6 mb-3">
            <div class="card shadow-sm normal-card h-100">
                <div class="card-body">

                    <div class="d-flex justify-content-between">
                        <h5 class="fw-bold">
                            Rank #${index + 2}: ${property.township}
                        </h5>

                        <span class="badge bg-secondary">
                            ${property.score}/100
                        </span>
                    </div>

                    <p class="text-muted"> ${property.area}, ${property.state} · ${property.type}</p>

                    <p class="mb-1">
                        <strong>Median Price:</strong>
                        RM ${property.median_price.toLocaleString()}
                    </p>

                    <p class="mb-1">
                        <strong>PSF:</strong>
                        RM ${property.median_psf}
                    </p>

                    <p class="mb-1">
                        <strong>Perks:</strong>
                        ${property.perks}
                    </p>

                    <p class="mb-0">
                        <strong>Amenities:</strong>
                        ${property.amenities}
                    </p>

                </div>
            </div>
        </div>
    `;
});

/* AI explanation */
document.getElementById("aiExplanation").textContent = result.ai_explanation;
}

// only render charts if there are recommendations
if (result.recommendations && result.recommendations.length > 0) {
    const props = result.recommendations.slice(0, 5);
    const labels = props.map(p => p.township);

    const COLORS = [
        "#0d6efd","#6610f2","#6f42c1","#d63384","#dc3545"
    ];

    // price comparison
    new Chart(document.getElementById("chartPrices"), {
        type: "line",
        data: {
            labels,
            datasets: [{
                label: "Median Price (RM)",
                data: props.map(p => p.median_price),
                backgroundColor: COLORS,
                borderRadius: 6
            },
                {
            label: "Your Budget",
            data: props.map(() => userInput.budget), // flat line
            borderColor: "#dc3545",
            borderDash: [5, 5], // dashed line
            pointRadius: 0,
            fill: false
        }]
        },
        options: {
            plugins: { legend: { display: false } },
            scales: {
                y: {
                    grid: { display: false },
                    ticks: { callback: v => "RM " + (v / 1000).toFixed(0) + "k" }
                },
                x: { grid: { display: false }, ticks: { font: { size: 10 } } }
            }
        }
    });
}


const chatHistory = [];

async function sendChat() {
    const input = document.getElementById("chatInput");
    const query = input.value.trim();
    if (!query) return;
    input.value = "";

    appendChat("user", query);
    chatHistory.push({ role: "user", content: query });

    const context = result.recommendations.slice(0, 5).map((p, i) =>
        `${i+1}. ${p.township} (${p.area}, ${p.state}) — RM${p.median_price.toLocaleString()}, Score: ${p.score}/100, Amenities: ${p.amenities}`
    ).join("\n");

    const fullPrompt = `You are a Malaysian real estate advisor.
    The user was looking for a ${userInput.property_type} in ${userInput.state} with budget RM${userInput.budget.toLocaleString()}.

    Recommendations:
    ${context}

    Conversation:
    ${chatHistory.map(m => `${m.role}: ${m.content}`).join("\n")}

    Answer concisely.`;

    try {
        const res = await fetch(BACKEND_URL + "/ask", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ query: fullPrompt })
        });
        const data = await res.json();
        const answer = data.answer ?? "No response.";
        chatHistory.push({ role: "assistant", content: answer });
        appendChat("assistant", answer);
    } catch (e) {
        appendChat("assistant", "Failed to get response.");
    }
}

function formatText(text) {
    return text
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')  // bold
        .replace(/\*(.*?)\*/g, '<em>$1</em>')              // italic
        .replace(/\n\*/g, '<br>•')                          // bullet points
        .replace(/\n/g, '<br>');                            // line breaks
}

function appendChat(role, text) {
    const div = document.getElementById("chatHistory");
    const isUser = role === "user";
    div.innerHTML += `
        <div class="d-flex ${isUser ? "justify-content-end" : "justify-content-start"} mb-2">
            <div class="px-3 py-2 rounded-3" style="
                max-width: 75%;
                background: ${isUser ? "#0d6efd" : "#f0f0f0"};
                color: ${isUser ? "white" : "black"};
                font-size: 0.88rem;
            ">${formatText(text)}</div>
        </div>
    `;
    div.scrollTop = div.scrollHeight;
}

document.getElementById("chatInput").addEventListener("keydown", e => {
    if (e.key === "Enter") sendChat();
});
</script>

</body>
</html>

<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Finder</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <style>
        body {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-card {
            max-width: 650px;
            margin: 70px auto;
            border: none;
            border-radius: 18px;
        }

        .title-small {
            color: #6c757d;
            font-size: 0.95rem;
        }
    </style>
</head>

<body>

<div class="container text-center py-5">

    <h1 class="fw-bold mb-2">House Finder</h1>
    <p class="title-small mb-5">
        Explore Malaysian property data and find your ideal home.
    </p>

    <div class="row text-center mb-5" id="statsRow">
        <div class="col-6 col-md-3">
            <h3 class="fw-bold" id="statTotal">—</h3>
            <p class="text-muted small">Total Properties</p>
        </div>
        <div class="col-6 col-md-3">
            <h3 class="fw-bold" id="statAvgPrice">—</h3>
            <p class="text-muted small">Avg. Price (RM)</p>
        </div>
        <div class="col-6 col-md-3">
            <h3 class="fw-bold" id="statAvgPsf">—</h3>
            <p class="text-muted small">Avg. PSF (RM)</p>
        </div>
        <div class="col-6 col-md-3">
            <h3 class="fw-bold" id="statStates">—</h3>
            <p class="text-muted small">States Covered</p>
        </div>
    </div>

    <!-- i moved the card prompt to here -->
    <button class="btn btn-primary btn-lg" data-bs-toggle="modal" data-bs-target="#searchModal">
        Find Your House
    </button>   

</div>

<div class = "modal fade" id="searchModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content border-0 rounded-4 shadow">
            <div class="modal-header border-0 pb-0">
                <h2 class="modal-title fw-bold w-100 text-center">House Finder</h2>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <p class="title-small">
                    Find suitable Malaysian property locations based on your budget and preferences.
                </p>

                <form id="searchForm">

                    <div class="mb-3">
                        <label for="budget" class="form-label">Budget (RM)</label>
                        <input
                            type="number"
                            class="form-control"
                            id="budget"
                            placeholder="Example: 500000"
                            required
                        >
                    </div>

                    <div class="mb-3">
                        <label for="state" class="form-label">Preferred State</label>
                        <select class="form-select" id="state" required>
                            <option selected disabled value="">Select a state</option>
                            <option>Johor</option>
                            <option>Kedah</option>
                            <option>Kelantan</option>
                            <option>Kuala Lumpur</option>
                            <option>Labuan</option>
                            <option>Melaka</option>
                            <option>Negeri Sembilan</option>
                            <option>Pahang</option>
                            <option>Penang</option>
                            <option>Perak</option>
                            <option>Perlis</option>
                            <option>Putrajaya</option>
                            <option>Sabah</option>
                            <option>Sarawak</option>
                            <option>Selangor</option>
                            <option>Terengganu</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label for="propertyType" class="form-label">Property Type</label>
                        <select class="form-select" id="propertyType" required>
                            <option selected disabled value="">Select a property type</option>
                            <option>Flat</option>
                            <option>Apartment</option>
                            <option>Condominium</option>
                            <option>Terrace House</option>
                            <option>Cluster House</option>
                            <option>Semi D</option>
                            <option>Bungalow</option>
                        </select>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">
                            Find Properties
                        </button>
                    </div>

                </form>

            </div>
        </div>
    </div>
</div>


<script>
const BACKEND_URL = "{{ backend_url }}";
const form = document.getElementById("searchForm");


async function loadStats() {
    try {
        const response = await fetch(BACKEND_URL + "/stats");
        const data = await response.json();
        console.log("BACKEND_URL =", BACKEND_URL);

        document.getElementById("statTotal").textContent =
        data.total_properties;

        document.getElementById("statAvgPrice").textContent =
        "RM " + (data.avg_price).toLocaleString();

        document.getElementById("statAvgPsf").textContent =
        "RM " + (data.avg_psf).toLocaleString();

        document.getElementById("statStates").textContent =
        data.total_states;
    } catch (error) {
        console.error("Failed to load stats:", error);
    }
}

loadStats();



form.addEventListener("submit", async function (event) {
    event.preventDefault();

    const userInput = {
        budget: Number(document.getElementById("budget").value),
        state: document.getElementById("state").value,
        property_type: document.getElementById("propertyType").value
    };

    localStorage.setItem("userInput", JSON.stringify(userInput));

    try {
        const response = await fetch(BACKEND_URL + "/search", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(userInput)
        });

        const result = await response.json();

        localStorage.setItem("searchResults", JSON.stringify(result));

        window.location.href = "result.html";

    } catch (error) {
        console.error("Error communicating with backend:", error);
        alert("Failed to get recommendations. Please check backend connection.");
    }
});
</script>

</body>
</html>

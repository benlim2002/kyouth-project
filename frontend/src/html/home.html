<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Finder</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .search-card {
            max-width: 600px;
            margin: 60px auto;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="card shadow search-card">
        <div class="card-body p-4">

            <h2 class="card-title text-center mb-4">
                House Finder
            </h2>

            <form id="searchform">

                <!-- Budget -->
                <div class="mb-3">
                    <label for="budget" class="form-label">
                        Budget (RM)
                    </label>
                    <input
                        type="number"
                        class="form-control"
                        id="budget"
                        placeholder="Enter your budget"
                    >
                </div>

                <!-- State -->
                <div class="mb-3">
                    <label for="state" class="form-label">
                        Preferred State
                    </label>

                    <select class="form-select" id="state">
                        <option selected disabled>Select a state</option>
                        <option>Johor</option>
                        <option>Kedah</option>
                        <option>Kelantan</option>
                        <option>Kuala Lumpur</option>
                        <option>Labuan</option>
                        <option>Melaka</option>
                        <option>Negeri Sembilan</option>
                        <option>Pahang</option>
                        <option>Penang</option>
                        <option>Perak</option>
                        <option>Perlis</option>
                        <option>Putrajaya</option>
                        <option>Sabah</option>
                        <option>Sarawak</option>
                        <option>Selangor</option>
                        <option>Terengganu</option>
                    </select>
                </div>

                <!-- Property Type -->
                <div class="mb-4">
                    <label for="propertyType" class="form-label">
                        Property Type
                    </label>

                    <select class="form-select" id="propertyType">
                        <option selected disabled>Select a property type</option>
                        <option>Flat</option>
                        <option>Apartment</option>
                        <option>Condominium</option>
                        <option>Terrace House</option>
                        <option>Cluster House</option>
                        <option>Semi D</option>
                        <option>Bungalow</option>
                    </select>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-primary">
                        Find Properties
                    </button>
                </div>

            </form>

        </div>
    </div>
</div>

<script>
	const BACKEND_URL = "{{ backend_url }}";
	const form = document.getElementById("searchform");

	form.addEventListener("submit", async function (event) {
		event.preventDefault();
		const budget = document.getElementById("budget").value;
		const state = document.getElementById("state").value;
		const propertyType = document.getElementById("propertyType").value;

		const data = {
			budget: budget,
			state: state,
			property_type: propertyType
		};
		console.log("Sending data to backend:", data);

		try 
		{
			const response = await fetch(BACKEND_URL, {
				method: "POST",
				headers: {
					"Content-Type": "application/json"
				},
				body: JSON.stringify(data)
			});

			const result = await response.json();
			console.log("Received response from backend:", result);
		}	
		catch (error) 
		{
			console.error("Error communicating with backend:", error);
		}
});
</script>

</body>
</html>
